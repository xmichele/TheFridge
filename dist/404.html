<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <title>The Fridge</title>
    <script>
      (function () {
        var redirectKey = 'gh-pages-spa-redirect';
        var pathParts = window.location.pathname.split('/').filter(Boolean);
        var repoBase = pathParts.length > 0 ? '/' + pathParts[0] + '/' : '/';
        var requestedPath =
          window.location.pathname + window.location.search + window.location.hash;

        window.sessionStorage.setItem(redirectKey, requestedPath);
        window.location.replace(window.location.origin + repoBase);
      })();
    </script>
  </head>
  <body></body>
</html>
